sentence=Arduino library for reading wind speed from pulse-based anemometers.
paragraph=This library provides a simple and robust interface to measure wind speed using pulse-counting anemometers. It includes a configurable conversion factor (FactorAnem) to adapt to different sensor specifications. FactorAnem can be updated at runtime, and in advanced setups (such as the Proagro Technology datalogger) it may be modified via Bluetooth commands. Users can also implement their own configuration logic if needed.
